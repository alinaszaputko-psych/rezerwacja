<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rezerwacja sesji</title>
  <style>
    /* ── Design tokens ── */
    :root {
      --bg:           #f5f2ed;
      --card:         #ffffff;
      --accent:       #6b9a7f;
      --accent-dark:  #4d7a62;
      --accent-light: #e8f2ec;
      --text:         #2a2a2a;
      --muted:        #6b6b6b;
      --border:       #dcd8d0;
      --error:        #c0392b;
      --radius-card:  16px;
      --radius-input: 10px;
      --shadow:       0 2px 10px rgba(0,0,0,.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 12px 12px 40px;
      line-height: 1.5;
    }

    .container { max-width: 520px; margin: 0 auto; }

    /* ── Language bar ── */
    .lang-bar {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-bottom: 10px;
    }
    .lang-btn {
      padding: 4px 12px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
    }
    .lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Therapist header ── */
    .therapist-card {
      background: var(--card);
      border-radius: var(--radius-card);
      padding: 22px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .therapist-avatar {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      overflow: hidden;
    }
    .therapist-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .therapist-info h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .therapist-welcome { font-size: 14px; color: var(--muted); }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: var(--radius-card);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent-dark);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Form fields ── */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 5px;
    }
    .required { color: var(--error); margin-left: 2px; }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-input);
      font-size: 15px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    .field input:focus,
    .field textarea:focus,
    .field select:focus { outline: none; border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 85px; }
    .field select { cursor: pointer; }
    .err-msg {
      font-size: 12px;
      color: var(--error);
      margin-top: 4px;
      display: none;
    }
    .field.has-err input,
    .field.has-err textarea,
    .field.has-err select { border-color: var(--error); }
    .field.has-err .err-msg { display: block; }

    /* ── Calendar ── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .cal-nav-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      transition: background .1s;
    }
    .cal-nav-btn:hover { background: var(--accent-light); }
    .cal-month { font-weight: 600; font-size: 15px; }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-hdr {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      padding: 3px 0 5px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all .1s;
      user-select: none;
    }
    .cal-day:hover:not(.dis):not(.other) { background: var(--accent-light); border-color: var(--accent); }
    .cal-day.sel { background: var(--accent); color: #fff; border-color: var(--accent); }
    .cal-day.today { border-color: var(--accent); font-weight: 700; }
    .cal-day.dis { color: var(--muted); cursor: not-allowed; opacity: .38; }
    .cal-day.other { color: var(--border); cursor: default; }
    .cal-err { outline: 2px solid var(--error); border-radius: 8px; }

    /* ── Time slots ── */
    #slots-section { margin-top: 18px; display: none; }
    .slots-label { font-size: 13px; font-weight: 500; margin-bottom: 8px; display: block; }
    .slots-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .slot {
      padding: 10px 4px;
      text-align: center;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all .12s;
    }
    .slot:hover:not(.taken) { border-color: var(--accent); background: var(--accent-light); }
    .slot.sel { background: var(--accent); color: #fff; border-color: var(--accent); }
    .slot.taken {
      background: #f0eeeb;
      color: var(--border);
      cursor: not-allowed;
      text-decoration: line-through;
    }
    .slots-msg {
      text-align: center;
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
      background: var(--accent-light);
      border-radius: 10px;
    }
    .slots-err { outline: 2px solid var(--error); border-radius: 10px; }

    /* ── Price box ── */
    .price-box {
      background: var(--accent-light);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .price-lbl { font-size: 14px; color: var(--muted); }
    .price-amt { font-size: 24px; font-weight: 700; color: var(--accent-dark); }

    /* ── Summary rows ── */
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .lbl { color: var(--muted); }
    .summary-row .val { font-weight: 500; text-align: right; max-width: 60%; }

    /* ── Notice ── */
    .notice {
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
      padding: 10px 13px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── GDPR consent ── */
    .gdpr-box {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--accent-light);
      border-radius: 10px;
      padding: 13px 14px;
      margin-bottom: 14px;
    }
    .gdpr-box input[type="checkbox"] {
      width: 18px;
      height: 18px;
      min-width: 18px;
      margin-top: 2px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .gdpr-box label {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.5;
      cursor: pointer;
    }
    .gdpr-box.has-err { outline: 2px solid var(--error); }
    .gdpr-err {
      font-size: 12px;
      color: var(--error);
      margin-top: 5px;
      display: none;
    }
    .gdpr-box.has-err + .gdpr-err { display: block; }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, color .15s;
      border: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-primary:disabled { background: var(--border); cursor: not-allowed; }
    .btn-secondary {
      background: #fff;
      color: var(--accent-dark);
      border: 1.5px solid var(--accent);
      margin-top: 10px;
    }
    .btn-secondary:hover { background: var(--accent-light); }
    .btn-cal {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      background: #fff;
      color: var(--accent-dark);
      border: 1.5px solid var(--accent);
      padding: 13px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      margin-top: 10px;
    }
    .btn-cal:hover { background: var(--accent-light); }

    /* ── Confirmation ── */
    .confirm-wrap { text-align: center; padding: 8px 0 16px; }
    .confirm-icon { font-size: 56px; margin-bottom: 12px; }
    .confirm-title { font-size: 21px; font-weight: 700; margin-bottom: 6px; }
    .confirm-sub { font-size: 14px; color: var(--muted); margin-bottom: 22px; line-height: 1.5; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Screens ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Responsive ── */
    @media (max-width: 380px) {
      .slots-grid { grid-template-columns: repeat(2, 1fr); }
      .therapist-card { flex-direction: column; text-align: center; }
    }
  </style>
</head>

<div class="container">

  <!-- Language switcher -->

    <div class="card">
      <div class="card-title">👤 <span data-t="sectionPersonal"></span></div>

        <div class="err-msg" data-t="errRequired"></div>
      </div>
      <div class="field" id="f-email">
        <label><span data-t="labelEmail"></span><span class="required">*</span></label>
        <input type="email" id="inp-email" autocomplete="email" inputmode="email">
        <div class="err-msg" id="email-err-msg"></div>
      </div>
      <div class="field">
        <label><span data-t="labelPhone"></span></label>
        <input type="tel" id="inp-phone" autocomplete="tel" inputmode="tel">
      </div>
    </div>

    <div class="card">
      <div class="card-title">💬 <span data-t="sectionSession"></span></div>
      <div class="field" id="f-problem">
        <label><span data-t="labelProblem"></span><span class="required">*</span></label>
        <textarea id="inp-problem"></textarea>
        <div class="err-msg" data-t="errRequired"></div>
      </div>
      <input type="hidden" id="inp-type" value="individual">
    </div>

    <div class="card">
      <div class="card-title">📅 <span data-t="sectionDateTime"></span></div>

      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calMove(-1)">&#8249;</button>
        <span class="cal-month" id="cal-month-lbl"></span>
        <button class="cal-nav-btn" onclick="calMove(1)">&#8250;</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>

      <div id="slots-section">
        <span class="slots-label" data-t="labelTime"></span>
        <div id="slots-container"></div>
      </div>
    </div>

    <div class="gdpr-box" id="gdpr-box">
      <input type="checkbox" id="inp-gdpr">
      <label for="inp-gdpr" id="gdpr-label"></label>
    </div>
    <div class="gdpr-err" id="gdpr-err"></div>

    <button class="btn btn-primary" onclick="submitForm()" id="btn-submit">
      <span data-t="btnContinue"></span>
    </button>
    <div style="height:32px"></div>
  </div>

  <!-- ── SCREEN 2: Payment summary ── -->
  <div class="screen" id="screen-payment">
    <div class="card">
      <div class="card-title">💳 <span data-t="sectionPayment"></span></div>
      <div id="pay-summary"></div>
      <div style="height:14px"></div>
      <div class="price-box">
        <span class="price-lbl" data-t="labelPrice"></span>
        <span class="price-amt" id="price-display"></span>
      </div>
      <div class="notice" data-t="paymentNotice"></div>
      <button class="btn btn-primary" id="btn-pay" onclick="goToStripe()">
        <span data-t="btnPay"></span>
      </button>
      <button class="btn btn-secondary" onclick="showScreen('form')" data-t="btnBack"></button>
    </div>
  </div>

  <!-- ── SCREEN 3: Confirmation ── -->
  <div class="screen" id="screen-confirm">
    <div class="card">
      <div class="confirm-wrap">
        <div class="confirm-icon">✅</div>
        <div class="confirm-title" data-t="confirmTitle"></div>
        <div class="confirm-sub" id="confirm-sub"></div>
        <div id="confirm-summary" style="text-align:left"></div>
        <div id="meet-box" style="display:none; margin:16px 0; background:var(--accent-light); border-radius:10px; padding:14px 16px; text-align:left;">
          <div style="font-size:13px; color:var(--muted); margin-bottom:6px;" id="meet-label"></div>
          <a id="meet-link-btn" target="_blank" rel="noopener"
             style="display:inline-block; background:var(--accent); color:#fff; padding:10px 18px; border-radius:8px; font-size:14px; font-weight:600; text-decoration:none; word-break:break-all;">
            🎥 <span id="meet-link-text"></span>
          </a>
        </div>
        <a id="btn-add-cal" class="btn-cal" target="_blank" rel="noopener">
          📅 <span data-t="btnAddCal"></span>
        </a>
        <button class="btn btn-secondary" onclick="location.href=location.pathname" data-t="btnBookAnother"></button>
        <a class="btn-cal" id="btn-back-site" style="margin-top:8px;">
          🏠 <span data-t="btnBackSite"></span>
        </a>
      </div>
    </div>
  </div>

</div><!-- /container -->

let lang = CONFIG.defaultLanguage;
let calYear, calMonth;
let selectedDate = null;
let selectedTime = null;
let busyCache    = {};
let pendingBooking = null;

// ╔══════════════════════════════════════════════════════════╗
// ║  LANGUAGE                                               ║
// ╚══════════════════════════════════════════════════════════╝
function detectLang() {
  const stored = localStorage.getItem('bk_lang');
  if (stored && T[stored]) return stored;
  const navLangs = (navigator.languages || [navigator.language || 'pl']);
  for (const l of navLangs) {
    if (l.toLowerCase().startsWith('ru')) return 'ru';
  }
  return 'pl';
}

function setLang(l) {
  if (!T[l]) return;
  lang = l;
  localStorage.setItem('bk_lang', l);
  document.documentElement.lang = l;
  document.getElementById('btn-pl').classList.toggle('active', l === 'pl');
  document.getElementById('btn-ru').classList.toggle('active', l === 'ru');
  applyTranslations();
  renderCalendar();
  if (selectedDate) renderSlots(selectedDate);
}

function tr(key) {
  return (T[lang] && T[lang][key] != null) ? T[lang][key] : (T.pl[key] || key);
}

function applyTranslations() {
  document.title = tr('pageTitle');

  document.getElementById('therapist-name').textContent    = CONFIG.therapistName;
  document.getElementById('therapist-welcome').textContent = CONFIG.welcomeText[lang] || CONFIG.welcomeText.pl;

  // Elements with data-t attribute
  document.querySelectorAll('[data-t]').forEach(el => {
    el.textContent = tr(el.getAttribute('data-t'));
  });

  // Placeholders
  setPlaceholder('inp-name',    tr('labelName'));
  setPlaceholder('inp-email',   tr('labelEmail'));
  setPlaceholder('inp-phone',   tr('labelPhone'));
  setPlaceholder('inp-problem', tr('labelProblem'));

  // GDPR label (plain text, no HTML)
  const gdprLabel = document.getElementById('gdpr-label');
  if (gdprLabel) gdprLabel.textContent = tr('gdprText');
  const gdprErr = document.getElementById('gdpr-err');
  if (gdprErr) gdprErr.textContent = tr('gdprErr');
}

function setPlaceholder(id, text) {
  const el = document.getElementById(id);
  if (el) el.placeholder = text;
}

// ╔══════════════════════════════════════════════════════════╗
// ║  GOOGLE CALENDAR — read availability (API key, public)  ║
// ╚══════════════════════════════════════════════════════════╝
let gapiReady = false;

function initGapi() {
  if (!CONFIG.googleApiKey || CONFIG.googleApiKey === 'REPLACE_ME') return;
  gapi.load('client', async () => {
    await gapi.client.init({
      apiKey: CONFIG.googleApiKey,
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'],
    });
    gapiReady = true;
  });
}

async function fetchBusySlots(dateStr) {
  if (busyCache[dateStr] !== undefined) return busyCache[dateStr];
  if (!gapiReady) { busyCache[dateStr] = []; return []; }

  const dayStart = new Date(dateStr + 'T00:00:00');
  const dayEnd   = new Date(dateStr + 'T23:59:59');

  try {
    const resp = await gapi.client.calendar.events.list({
      calendarId:   CONFIG.googleCalendarId,
      timeMin:      dayStart.toISOString(),
      timeMax:      dayEnd.toISOString(),
      singleEvents: true,
      orderBy:      'startTime',
    });
    // Store full {start, end} ranges so we can detect overlap, not just exact matches
    const ranges = (resp.result.items || [])
      .filter(ev => ev.start && (ev.start.dateTime || ev.start.date))
      .map(ev => ({
        start: ev.start.dateTime
          ? new Date(ev.start.dateTime).getTime()
          : new Date(dateStr + 'T00:00:00').getTime(),
        end: ev.end.dateTime
          ? new Date(ev.end.dateTime).getTime()
          : new Date(dateStr + 'T23:59:59').getTime(),
      }));
    busyCache[dateStr] = ranges;
    return ranges;
  } catch (e) {
    console.warn('Calendar API error:', e);
    busyCache[dateStr] = [];
    return [];
  }
}

// ╔══════════════════════════════════════════════════════════╗
// ║  CALENDAR                                               ║
// ╚══════════════════════════════════════════════════════════╝
function initCalendar() {
  const now = new Date();
  calYear  = now.getFullYear();
  calMonth = now.getMonth();
  renderCalendar();
}

function calMove(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  const months = tr('monthNames');
  const days   = tr('dayNamesShort'); // indexed 0=Sun

  document.getElementById('cal-month-lbl').textContent =
    `${months[calMonth]} ${calYear}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Headers: Mon → Sun (ISO week)
  const weekOrder = [1,2,3,4,5,6,0];
  weekOrder.forEach(d => {
    const h = document.createElement('div');
    h.className = 'cal-hdr';
    h.textContent = days[d];
    grid.appendChild(h);
  });

  const today = new Date();
  today.setHours(0,0,0,0);

  const firstDay   = new Date(calYear, calMonth, 1);
  const daysInMon  = new Date(calYear, calMonth + 1, 0).getDate();
  const prevDays   = new Date(calYear, calMonth, 0).getDate();

  // Offset (Mon=0 … Sun=6)
  let offset = firstDay.getDay() - 1;
  if (offset < 0) offset = 6;

  // Prev-month filler cells
  for (let i = 0; i < offset; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other';
    el.textContent = prevDays - offset + i + 1;
    grid.appendChild(el);
  }

  // Current month days
  for (let d = 1; d <= daysInMon; d++) {
    const date    = new Date(calYear, calMonth, d);
    const dateStr = fmtDate(date);
    const el      = document.createElement('div');
    el.className  = 'cal-day';
    el.textContent = d;

    const isToday   = date.getTime() === today.getTime();
    const isPast    = date < today;
    const isWorking = CONFIG.workingDays.includes(date.getDay());

    if (isToday) el.classList.add('today');

    if (isPast || !isWorking) {
      el.classList.add('dis');
    } else {
      if (selectedDate && fmtDate(selectedDate) === dateStr) el.classList.add('sel');
      el.addEventListener('click', () => onDateClick(date));
    }
    grid.appendChild(el);
  }

  // Fill trailing cells to complete last row
  const total = offset + daysInMon;
  const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= trailing; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day other';
    el.textContent = i;
    grid.appendChild(el);
  }
}

// ╔══════════════════════════════════════════════════════════╗
// ║  TIME SLOTS                                             ║
// ╚══════════════════════════════════════════════════════════╝
async function onDateClick(date) {
  selectedDate = date;
  selectedTime = null;
  renderCalendar();

  const section   = document.getElementById('slots-section');
  const container = document.getElementById('slots-container');
  section.style.display = 'block';
  container.classList.remove('slots-err');
  container.innerHTML = `<div class="slots-msg">${tr('slotsLoading')}</div>`;

  const dateStr = fmtDate(date);
  const taken   = await fetchBusySlots(dateStr);
  renderSlots(date, taken);
}

function isSlotTaken(dateStr, slotTime, busyRanges) {
  if (!busyRanges || !busyRanges.length) return false;
  const [h, m] = slotTime.split(':').map(Number);
  const slotStart = new Date(dateStr + 'T' + slotTime + ':00').getTime();
  const slotEnd   = slotStart + CONFIG.sessionDurationMinutes * 60000;
  // Slot is blocked if it overlaps with ANY calendar event (not just exact start match)
  return busyRanges.some(r => slotStart < r.end && slotEnd > r.start);
}

function renderSlots(date, takenOverride) {
  const container = document.getElementById('slots-container');
  const dateStr   = fmtDate(date);
  const busyRanges = takenOverride !== undefined ? takenOverride : (busyCache[dateStr] || []);
  const allSlots  = generateSlots();

  if (!allSlots.length) {
    container.innerHTML = `<div class="slots-msg">${tr('slotsNone')}</div>`;
    return;
  }

  const freeSlots = allSlots.filter(s => !isSlotTaken(dateStr, s, busyRanges));
  if (!freeSlots.length) {
    container.innerHTML = `<div class="slots-msg">${tr('slotsNone')}</div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'slots-grid';

  allSlots.forEach(time => {
    const btn = document.createElement('button');
    btn.className = 'slot';
    btn.textContent = time;
    if (isSlotTaken(dateStr, time, busyRanges)) {
      btn.classList.add('taken');
      btn.disabled = true;
    } else {
      btn.addEventListener('click', () => {
        selectedTime = time;
        document.querySelectorAll('.slot').forEach(b => b.classList.remove('sel'));
        btn.classList.add('sel');
      });
      if (selectedTime === time) btn.classList.add('sel');
    }
    grid.appendChild(btn);
  });

  container.innerHTML = '';
  container.appendChild(grid);
}

function generateSlots() {
  const [sh, sm] = CONFIG.workingHours.start.split(':').map(Number);
  const [eh, em] = CONFIG.workingHours.end.split(':').map(Number);
  const slots = [];
  let cur = sh * 60 + sm;
  const end = eh * 60 + em;
  while (cur + CONFIG.sessionDurationMinutes <= end) {
    slots.push(`${pad(Math.floor(cur/60))}:${pad(cur%60)}`);
    cur += CONFIG.sessionDurationMinutes;
  }
  return slots;
}

// ╔══════════════════════════════════════════════════════════╗
// ║  FORM VALIDATION & SUBMIT                               ║
// ╚══════════════════════════════════════════════════════════╝
function setFieldErr(fieldId, errKey) {
  const field = document.getElementById(fieldId);
  field.classList.add('has-err');
  const msg = field.querySelector('.err-msg');
  if (msg) msg.textContent = tr(errKey);
}
function clearFieldErr(fieldId) {
  document.getElementById(fieldId).classList.remove('has-err');
}

function submitForm() {
  let ok = true;

  const name    = document.getElementById('inp-name').value.trim();
  const email   = document.getElementById('inp-email').value.trim();
  const phone   = document.getElementById('inp-phone').value.trim();
  const problem = document.getElementById('inp-problem').value.trim();
  const stype   = document.getElementById('inp-type').value;

  if (!name)  { setFieldErr('f-name', 'errRequired');   ok = false; }
  else          clearFieldErr('f-name');

  const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  if (!emailOk) {
    setFieldErr('f-email', 'errEmail');
    document.getElementById('email-err-msg').textContent = tr('errEmail');
    ok = false;
  } else clearFieldErr('f-email');

  if (!problem) { setFieldErr('f-problem', 'errRequired'); ok = false; }
  else            clearFieldErr('f-problem');

  const grid = document.getElementById('cal-grid');
  if (!selectedDate) {
    grid.classList.add('cal-err');
    setTimeout(() => grid.classList.remove('cal-err'), 2000);
    ok = false;
  }

  const slotWrap = document.getElementById('slots-container');
  if (!selectedTime) {
    slotWrap.classList.add('slots-err');
    setTimeout(() => slotWrap.classList.remove('slots-err'), 2000);
    ok = false;
  }

  // GDPR consent check
  const gdprBox = document.getElementById('gdpr-box');
  if (!document.getElementById('inp-gdpr').checked) {
    gdprBox.classList.add('has-err');
    setTimeout(() => gdprBox.classList.remove('has-err'), 3000);
    ok = false;
  } else {
    gdprBox.classList.remove('has-err');
  }

  if (!ok) return;

  // Build and persist booking
  const b = {
    name, email, phone, problem,
    sessionType:  stype,
    date:         fmtDate(selectedDate),
    dateFriendly: fmtDateFriendly(selectedDate),
    time:         selectedTime,
    price:        CONFIG.sessionPrice,
    currency:     CONFIG.currency,
    lang,
    ts:           Date.now(),
  };

  // Use localStorage (survives Stripe redirect in same tab)
  localStorage.setItem('bk_pending', JSON.stringify(b));
  pendingBooking = b;

  showPaymentScreen(b);
}

// ╔══════════════════════════════════════════════════════════╗
// ║  PAYMENT SCREEN                                         ║
// ╚══════════════════════════════════════════════════════════╝
function showPaymentScreen(b) {
  document.getElementById('price-display').textContent =
    `${b.price} ${b.currency}`;

  const typeLbl = typeLabel(b.sessionType);
  const rows = [
    [tr('summaryDate'),     b.dateFriendly],
    [tr('summaryTime'),     b.time],
    ...(typeLbl ? [[tr('summaryType'), typeLbl]] : []),
    [tr('summaryDuration'), `${CONFIG.sessionDurationMinutes} ${tr('summaryMinutes')}`],
  ];

  document.getElementById('pay-summary').innerHTML =
    rows.map(([l, v]) =>
      `<div class="summary-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`
    ).join('');

  showScreen('payment');
}

function goToStripe() {
  const btn = document.getElementById('btn-pay');
  btn.innerHTML = `<span class="spinner"></span>${tr('btnPay')}`;
  btn.disabled = true;

  // Pass a reference ID to Stripe (visible in dashboard)
  const ref = encodeURIComponent([
    pendingBooking.date,
    pendingBooking.time.replace(':','-'),
    pendingBooking.email,
  ].join('_'));

  window.location.href = `${CONFIG.stripePaymentLinkUrl}?client_reference_id=${ref}`;
}

// ╔══════════════════════════════════════════════════════════╗
// ║  CONFIRMATION SCREEN                                    ║
// ╚══════════════════════════════════════════════════════════╝
function showConfirmScreen() {
  const raw = localStorage.getItem('bk_pending');
  if (!raw) { showScreen('form'); return; }
  const b = JSON.parse(raw);
  if (Date.now() - b.ts > 7200000) {
    localStorage.removeItem('bk_pending');
    showScreen('form');
    return;
  }
  if (b.lang && T[b.lang]) { lang = b.lang; setLang(lang); }
  pendingBooking = b;
  localStorage.removeItem('bk_pending');

  // Show confirm screen immediately with available info
  renderConfirmUI(b);
  showScreen('confirm');

  // Then create the calendar event (triggers OAuth popup if needed)
  createCalendarEvent(b);
}

function renderConfirmUI(b) {
  document.getElementById('confirm-sub').textContent =
    `${b.name} — ${tr('confirmSubMsg')}`;

  const rows = [
    [tr('summaryDate'),     b.dateFriendly || b.date],
    [tr('summaryTime'),     b.time],
    [tr('summaryDuration'), `${CONFIG.sessionDurationMinutes} ${tr('summaryMinutes')}`],
  ];
  document.getElementById('confirm-summary').innerHTML =
    rows.map(([l, v]) =>
      `<div class="summary-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`
    ).join('');

  const backBtn = document.getElementById('btn-back-site');
  if (backBtn) backBtn.href = CONFIG.websiteUrl[b.lang] || CONFIG.websiteUrl.pl;

  // Hide meet box until we get the link from Calendar API
  const meetBox = document.getElementById('meet-box');
  if (meetBox) meetBox.style.display = 'none';

  // Hide add-to-cal button until event is created
  const calBtn = document.getElementById('btn-add-cal');
  if (calBtn) calBtn.style.display = 'none';
}

async function createCalendarEvent(b) {
  // If Vercel URL not configured yet, fall back to deep link
  if (!CONFIG.vercelApiUrl || CONFIG.vercelApiUrl === 'REPLACE_WITH_VERCEL_URL') {
    showAddToCalFallback(b);
    return;
  }

  // Show "creating…" spinner
  const meetBox = document.getElementById('meet-box');
  if (meetBox) {
    meetBox.style.display = 'block';
    meetBox.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:8px 0;">⏳ ${tr('creatingEvent')}</div>`;
  }

  try {
    const resp = await fetch(CONFIG.vercelApiUrl, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:     b.name,
        email:    b.email,
        phone:    b.phone || '',
        problem:  b.problem,
        date:     b.date,
        time:     b.time,
        duration: CONFIG.sessionDurationMinutes,
        lang:     b.lang,
      }),
    });

    const data = await resp.json();

    if (data.success && data.meetLink) {
      showMeetLink(data.meetLink, data.eventLink);
    } else {
      showAddToCalFallback(b);
    }
  } catch (err) {
    console.warn('Vercel API error:', err);
    showAddToCalFallback(b);
  }
}

function showMeetLink(meetLink, eventLink) {
  const meetBox = document.getElementById('meet-box');
  if (!meetBox) return;

  if (meetLink) {
    meetBox.style.display = 'block';
    meetBox.innerHTML = `
      <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">${tr('meetLabel')}</div>
      <a href="${meetLink}" target="_blank" rel="noopener"
         style="display:inline-block;background:var(--accent);color:#fff;padding:10px 18px;
                border-radius:8px;font-size:14px;font-weight:600;text-decoration:none;">
        🎥 ${tr('meetLinkText')}
      </a>`;
  } else {
    meetBox.style.display = 'none';
  }

  // Show the calendar event link if we have it
  const calBtn = document.getElementById('btn-add-cal');
  if (calBtn && eventLink) {
    calBtn.href = eventLink;
    calBtn.style.display = 'flex';
  } else if (calBtn) {
    calBtn.style.display = 'none';
  }
}

function showAddToCalFallback(b) {
  // No OAuth — show the deep-link "Add to Google Calendar" button instead
  const [y, mo, d] = b.date.split('-').map(Number);
  const [h, m]     = b.time.split(':').map(Number);
  const start = new Date(y, mo-1, d, h, m);
  const end   = new Date(start.getTime() + CONFIG.sessionDurationMinutes * 60000);
  const fmtGCal = dt => dt.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  const url = 'https://calendar.google.com/calendar/render?action=TEMPLATE'
    + `&text=${encodeURIComponent('Sesja – ' + CONFIG.therapistName)}`
    + `&dates=${fmtGCal(start)}/${fmtGCal(end)}`
    + `&details=${encodeURIComponent(b.problem)}`
    + `&add=${encodeURIComponent(b.email)}`;

  const calBtn = document.getElementById('btn-add-cal');
  if (calBtn) { calBtn.href = url; calBtn.style.display = 'flex'; }

  const meetBox = document.getElementById('meet-box');
  if (meetBox) meetBox.style.display = 'none';
}

// ╔══════════════════════════════════════════════════════════╗
// ║  SCREEN ROUTING                                         ║
// ╚══════════════════════════════════════════════════════════╝
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function handleUrlParams() {
  const p = new URLSearchParams(window.location.search);
  const status = p.get('status') || p.get('booking');
  if (status === 'paid' || status === 'success') {
    window.history.replaceState({}, '', window.location.pathname);
    showConfirmScreen();
    return true;
  }
  return false;
}

// ╔══════════════════════════════════════════════════════════╗
// ║  HELPERS                                                ║
// ╚══════════════════════════════════════════════════════════╝
function pad(n) { return String(n).padStart(2, '0'); }

function fmtDate(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function fmtTime(d) {
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtDateFriendly(d) {
  return `${tr('dayNamesFull')[d.getDay()]}, ${d.getDate()} ${tr('monthNames')[d.getMonth()]} ${d.getFullYear()}`;
}
function typeLabel(key) {
  // Only individual sessions offered — hide from all summaries
  return '';
}

// ╔══════════════════════════════════════════════════════════╗
// ║  INIT                                                   ║
// ╚══════════════════════════════════════════════════════════╝
window.addEventListener('load', () => {
  lang = detectLang();
  setLang(lang);
  initCalendar();
  if (!handleUrlParams()) showScreen('form');
});

// Google API callback
window.gapiOnload = initGapi;
